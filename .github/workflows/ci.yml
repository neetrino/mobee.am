name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Prisma schema requires DIRECT_URL (Neon-style); plain Postgres CI uses the same URL.
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      DIRECT_URL: postgresql://test:test@localhost:5432/test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Apply migrations (test DB)
        run: pnpm run db:migrate:deploy

      - name: Migration health check
        run: pnpm run db:migrate:health

      - name: Lint
        run: pnpm run lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build
        env:
          SKIP_ENV_VALIDATION: 1
